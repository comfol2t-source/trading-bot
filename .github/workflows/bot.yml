name: Trading Bot

on:
  # Run every 10 minutes
  schedule:
    - cron: '*/10 * * * *'
  # Allow manual trigger from Actions tab
  workflow_dispatch:
  # Run on push to main (useful for testing config changes)
  push:
    branches: [main]
    paths:
      - 'config.py'
      - 'main.py'
      - 'bot/**'
      - 'data/**'
      - 'analysis/**'
      - '.github/workflows/bot.yml'

# Allow the workflow to commit state changes back
permissions:
  contents: write

# Prevent concurrent runs (avoid git push conflicts)
concurrency:
  group: trading-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need write token to commit state back
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot (auto mode)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_API_KEY:    ${{ secrets.FINNHUB_API_KEY }}
        run: python main.py auto

      - name: Commit state changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain .state/)" ]]; then
            git add .state/
            git commit -m "chore(state): update bot state [skip ci]"
            # Retry push up to 3 times in case of concurrent commit
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break || sleep 5
            done
          else
            echo "No state changes to commit."
          fi
